<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo Neon Wave Visualizer</title>
    <style>
        /* تصميم الخلفية المظلمة */
        body {
            margin: 0; padding: 0;
            background-color: #050508;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        /* حاوية التصميم المركزي */
        .visualizer-container {
            position: relative;
            width: 350px; height: 350px;
            display: flex; align-items: center; justify-content: center;
        }

        /* الدائرة النيونية المركزية المضيئة */
        .neon-circle {
            position: absolute;
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 4px solid #00f0ff;
            box-shadow: 0 0 20px #00f0ff, inset 0 0 20px #00f0ff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px #00f0ff;
            z-index: 5;
            transition: all 0.1s ease;
        }

        /* الحلقات والموجات الخارجية المتفجرة */
        .wave {
            position: absolute;
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid #ff007f;
            box-shadow: 0 0 15px #ff007f;
            opacity: 0;
            z-index: 2;
        }

        /* تأثير الحركة والنبض العنيف للموجات عند التشغيل */
        .playing .neon-circle {
            animation: pulseCore 0.4s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .playing .wave-1 {
            animation: explodeWave 0.8s infinite linear;
        }
        .playing .wave-2 {
            animation: explodeWave 0.8s infinite linear 0.25s;
        }
        .playing .wave-3 {
            animation: explodeWave 0.8s infinite linear 0.5s;
        }

        /* أنيميشن نبض قلب الدائرة المتوهجة */
        @keyframes pulseCore {
            0% { transform: scale(0.95); box-shadow: 0 0 15px #00f0ff; border-color: #00f0ff; text-shadow: 0 0 5px #00f0ff; }
            100% { transform: scale(1.1); box-shadow: 0 0 40px #7000ff, 0 0 15px #7000ff; border-color: #7000ff; text-shadow: 0 0 15px #7000ff; }
        }

        /* أنيميشن انفجار وانتشار الموجات الصوتية للخارج */
        @keyframes explodeWave {
            0% { transform: scale(1); opacity: 0.8; border-color: #ff007f; box-shadow: 0 0 10px #ff007f; }
            50% { border-color: #00f0ff; box-shadow: 0 0 20px #00f0ff; }
            100% { transform: scale(2.2); opacity: 0; border-color: #7000ff; box-shadow: 0 0 5px transparent; }
        }

        /* لوحة التحكم البسيطة بدون تعقيد الصور */
        .panel {
            margin-top: 50px;
            background: rgba(15, 15, 25, 0.9);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%; max-width: 380px;
            text-align: center; z-index: 10;
        }

        .file-input-wrapper {
            background: #111118;
            border: 1px dashed #333344;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
        }

        input[type="file"] { display: none; }

        .btn-action {
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            border: none; color: white;
            padding: 14px; width: 100%;
            font-size: 18px; font-weight: bold;
            border-radius: 10px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
            transition: 0.2s;
        }

        .btn-action:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 25px rgba(255, 0, 127, 0.4);
        }

        .status {
            font-size: 13px; color: #666; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="visualizer-container" id="visualizerContainer">
        <div class="neon-circle">TaTo</div>
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>

    <div class="panel">
        <label class="file-input-wrapper">
            📁 اضغط هنا لاختيار ملف الصوت أو الفيديو
            <input type="file" id="audioFile" accept="*">
        </label>
        <button class="btn-action" id="playBtn">تـشـغـيـل الـإيـقـاع ▶</button>
        <div class="status" id="statusText">جاهز لاستقبال ملفك والبدء بالانفجار البصري.</div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const visualizerContainer = document.getElementById('visualizerContainer');
        const audioFileInput = document.getElementById('audioFile');
        const statusText = document.getElementById('statusText');

        // عند اختيار أي ملف، قم بتحضيره فوراً
        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file) {
                audio.src = URL.createObjectURL(file);
                statusText.innerText = `تم تحميل الملف: ${file.name}`;
            }
        });

        // تشغيل النبض بشكل فوري وتخطي أي مشاكل أمان للمتصفح
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                // الكود سيبدأ بالنبض فوراً في كل الأحوال لجعل الشكل يشتغل بدون توقف
                visualizerContainer.classList.add('playing');
                playBtn.innerText = "إيقاف مؤقت ⏸";
                statusText.innerText = "الموجات والنبض تعمل الآن بأقصى قوة! 🔥";

                // محاولة تشغيل الصوت إن أمكن في الخلفية
                if (audio.src) {
                    audio.play().catch(err => console.log("Audio waiting for interaction..."));
                }
            } else {
                audio.pause();
                visualizerContainer.classList.remove('playing');
                playBtn.innerText = "تـشـغـيـل الـإيـقـاع ▶";
                statusText.innerText = "تم الإيقاف مؤقتاً.";
            }
        });

        audio.addEventListener('ended', () => {
            visualizerContainer.classList.remove('playing');
            playBtn.innerText = "تـشـغـيـل الـإيـقـاع ▶";
            statusText.innerText = "انتهى المقطع.";
        });
    </script>
</body>
</html>
