<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo Trap Nation Visualizer</title>
    <style>
        /* تصميم الخلفية المظلمة الشبيهة بـ Trap Nation */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية المشغل الرئيسي */
        .visualizer-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* هالة النيون الخلفية التي تتمدد وتتوهج مع الصوت */
        .neon-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.6) 0%, rgba(255, 0, 127, 0.3) 50%, transparent 70%);
            filter: blur(20px);
            z-index: 1;
            transition: transform 0.05s ease-out; /* استجابة فائقة السرعة للترددات */
            transform: scale(1);
        }

        /* الشعار الدائري المركزي (تستطيع استبداله بأي صورة تريدها) */
        .main-logo {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1614680376593-902f74fa0d41?q=80&w=1974&auto=format&fit=crop') center/cover;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 2;
            transition: transform 0.05s ease-out;
        }

        /* لوحة التحكم السفلية المخصصة لإدخال الروابط */
        .control-panel {
            margin-top: 40px;
            background: rgba(20, 20, 20, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222;
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
            z-index: 10;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #00f0ff;
        }

        .btn {
            background: linear-gradient(45deg, #00f0ff, #7000ff);
            border: none;
            color: white;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .status-text {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <div class="neon-glow" id="glow"></div>
        <div class="main-logo" id="logo"></div>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="audioUrl" placeholder="ضع رابط الأغنية المباشر هنا (MP3)...">
            <button class="btn" id="loadBtn">تحميل 🎧</button>
        </div>
        <button class="btn" id="playBtn" style="width: 100%; margin-bottom: 10px;">تشغيل / إيقاف مؤقت ⏯</button>
        <div class="status-text" id="status">اكتب رابطاً واضغط تحميل للبدء بالنبض تلقائياً.</div>
    </div>

    <audio id="myAudio" crossOrigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const loadBtn = document.getElementById('loadBtn');
        const audioUrlInput = document.getElementById('audioUrl');
        const logo = document.getElementById('logo');
        const glow = document.getElementById('glow');
        const statusText = document.getElementById('status');

        // نغمة افتراضية حماسية لكي تعمل الصفحة مباشرة عند التجربة
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3";

        let audioContext, analyser, source, dataArray;
        let isInitialized = false;

        // دالة تهيئة نظام تحليل الصوت (Web Audio API) عند أول ضغطة للمستخدم
        function initAudioAnalyzer() {
            if (isInitialized) return;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            
            // ربط عنصر الصوت بمحلل الترددات
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            // إعدادات حجم مصفوفة البيانات (كلما زاد الرقم زادت الدقة)
            analyser.fftSize = 64; 
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            isInitialized = true;
            animateVisualizer();
        }

        // دالة الأنيميشن المستمر الذي يقرأ قوة الصوت في نفس اللحظة
        function animateVisualizer() {
            requestAnimationFrame(animateVisualizer);
            
            if (!isInitialized || audio.paused) return;
            
            // الحصول على بيانات الترددات الحالية
            analyser.getByteFrequencyData(dataArray);
            
            // التركيز على الترددات المنخفضة (Bass) وهي التي تسبب النبض القوي في أول المصفوفة
            let bassValue = dataArray || 0; 
            
            // تحويل القيمة الصوتية إلى نسبة مئوية للتحجيم والتوهج
            let scaleFactor = 1 + (bassValue / 255) * 0.25; // النبض للشعار
            let glowFactor = 1 + (bassValue / 255) * 0.6;  // النبض للهالة الخلفية
            
            // تطبيق التأثيرات مباشرة على العناصر
            logo.style.transform = `scale(${scaleFactor})`;
            glow.style.transform = `scale(${glowFactor})`;
            
            // تغيير شدة التوهج اللوني بناءً على قوة الصوت
            glow.style.opacity = 0.3 + (bassValue / 255) * 0.7;
        }

        // زر التشغيل والإيقاف
        playBtn.addEventListener('click', () => {
            initAudioAnalyzer(); // تفعيل المحلل
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            if (audio.paused) {
                audio.play();
                statusText.innerText = "جاري النبض والتفاعل مع الإيقاع الحقيقي! 🔥";
            } else {
                audio.pause();
                statusText.innerText = "تم الإيقاف مؤقتاً.";
            }
        });

        // زر تحميل الرابط الجديد
        loadBtn.addEventListener('click', () => {
            const url = audioUrlInput.value.trim();
            if(url) {
                audio.src = url;
                statusText.innerText = "تم تحميل الرابط الجديد بنجاح. اضغط تشغيل!";
                audio.pause();
            } else {
                alert("الرجاء وضع رابط مباشر صحيح ينتهي بـ .mp3 أو رابط بث مباشر مدعوم.");
            }
        });
    </script>
</body>
</html>
