<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل عائلة TaTo</title>
    <style>
        /* التصميم (CSS) */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .player-card {
            background: linear-gradient(145deg, #1e1e1e, #121212);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        h2 {
            color: #1DB954;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .upload-btn {
            background-color: #ffffff;
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
            margin-bottom: 30px;
        }

        .upload-btn:active {
            transform: scale(0.95);
        }

        #file-input {
            display: none;
        }

        .song-details {
            margin: 20px 0;
        }

        #song-name {
            font-size: 1.1rem;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.5);
        }

        .visualizer {
            height: 5px;
            background: #1DB954;
            width: 0%;
            transition: width 0.1s;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h2>TaTo Player</h2>
        
        <div class="upload-section">
            <label for="file-input" class="upload-btn">
                اختر ملف صوتي
            </label>
            <input type="file" id="file-input" accept="audio/*">
        </div>

        <div class="song-details">
            <div id="song-name">جاهز للتشغيل...</div>
            <div class="visualizer" id="progress-bar"></div>
        </div>

        <audio id="main-audio" controls></audio>
    </div>

    <script>
        // البرمجة (JavaScript)
        const fileInput = document.getElementById('file-input');
        const audio = document.getElementById('main-audio');
        const songName = document.getElementById('song-name');
        const progressBar = document.getElementById('progress-bar');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file) {
                // عرض اسم الملف
                songName.textContent = file.name;

                // إنشاء رابط للملف المحمل محلياً
                const url = URL.createObjectURL(file);
                audio.src = url;

                // البدء بالتشغيل فوراً
                audio.play().catch(error => {
                    console.log("التشغيل التلقائي يحتاج تفاعل المستخدم أولاً.");
                });
            }
        });

        // تحديث شريط بسيط للجمالية أثناء العمل
        audio.addEventListener('timeupdate', function() {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percentage + '%';
        });

        // تنظيف الذاكرة عند تغيير الأغنية
        audio.addEventListener('play', () => {
             if (audio.src.startsWith('blob:')) {
                 // الروابط المؤقتة فعالة جداً للهواتف
             }
        });
    </script>
</body>
</html>
