<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PhonkCIAN - Parano! (Slowed+Reverb) | متوافق مع iOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030205);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255, 0, 100, 0.02) 0px, rgba(255, 0, 100, 0.02) 2px, transparent 2px, transparent 8px),
                        repeating-linear-gradient(135deg, rgba(0, 255, 200, 0.02) 0px, rgba(0, 255, 200, 0.02) 1px, transparent 1px, transparent 6px);
            pointer-events: none;
            z-index: 0;
        }
        .phonk-player {
            max-width: 1100px;
            width: 100%;
            background: rgba(12, 10, 20, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 70, 140, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 80, 120, 0.2), 0 0 20px rgba(255, 0, 100, 0.3);
            padding: 2rem 1.8rem;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .song-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 100, 150, 0.5);
            padding-bottom: 1rem;
        }
        .song-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4d8c, #b9266f, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 70, 140, 0.5);
        }
        .song-artist {
            font-size: 1rem;
            color: #cfb3ff;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 300;
        }
        .tag {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ff98c0;
            margin-top: 8px;
            border: 0.5px solid #ff3a7a;
        }
        .viz-container {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 2rem;
            padding: 1rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 100, 150, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.2);
        }
        canvas#audioVisualizer {
            width: 100%;
            height: 180px;
            display: block;
            border-radius: 1.2rem;
            background: #010008;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 8px #ff3a7a;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.8rem 0;
        }
        .btn {
            background: rgba(20, 15, 35, 0.8);
            border: 1px solid #ff4d8c;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(95deg, #c2185b, #8e2c6d);
            border-color: #ff80ab;
            box-shadow: 0 0 10px #ff3a7a;
        }
        .btn-primary:hover {
            transform: scale(1.02);
        }
        .btn:hover {
            background: rgba(80, 40, 80, 0.9);
            border-color: #ff99bb;
        }
        .file-label {
            background: #2a1e3c;
            border: 1px solid #b96f9f;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #3c2a52;
        }
        input[type="file"] {
            display: none;
        }
        .status {
            text-align: center;
            color: #e2c8ff;
            font-size: 0.85rem;
            margin: 12px 0 0;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 2rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            max-width: 90%;
        }
        .slider-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            margin: 1rem 0 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
        }
        .effect-control {
            flex: 1;
            min-width: 130px;
        }
        .effect-control label {
            font-size: 0.7rem;
            color: #ffafcf;
            display: block;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            background: #3a2a4a;
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff5e9e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px #ff99cc;
        }
        .value-display {
            color: #ffb7d0;
            font-size: 0.7rem;
            text-align: right;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7a62a5;
            margin-top: 1.5rem;
            border-top: 0.5px solid rgba(255,100,150,0.3);
            padding-top: 1rem;
        }
        @media (max-width: 650px) {
            .phonk-player { padding: 1.2rem; }
            .song-title { font-size: 1.6rem; }
            .btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>
<div class="phonk-player">
    <div class="song-header">
        <div class="song-title">PARANO! (slowed + reverb)</div>
        <div class="song-artist">PHONKCIAN · ETERNAL XLKZ</div>
        <div class="tag">⚡ SLOWED | 🎧 REVERB | 🔮 VISUALIZER | 📱 iOS READY</div>
    </div>

    <div class="viz-container">
        <canvas id="audioVisualizer" width="800" height="180" style="width:100%; height:180px"></canvas>
    </div>

    <div class="controls">
        <button id="playBtn" class="btn btn-primary">▶ تشغيل</button>
        <button id="pauseBtn" class="btn">⏸ إيقاف مؤقت</button>
        <button id="stopBtn" class="btn">⏹ إيقاف كامل</button>
        <label class="file-label" for="audioUpload">📁 رفع ملف (MP3, WAV, M4A)</label>
        <input type="file" id="audioUpload" accept="audio/mpeg, audio/wav, audio/ogg, audio/mp3, audio/aac, audio/m4a, audio/x-m4a">
    </div>

    <div class="slider-panel">
        <div class="effect-control">
            <label>🐌 SLOW (speed)</label>
            <input type="range" id="speedSlider" min="0.5" max="1.2" step="0.01" value="0.78">
            <div class="value-display" id="speedVal">0.78x</div>
        </div>
        <div class="effect-control">
            <label>🌀 REVERB</label>
            <input type="range" id="reverbSlider" min="0" max="0.85" step="0.01" value="0.55">
            <div class="value-display" id="reverbVal">0.55</div>
        </div>
        <div class="effect-control">
            <label>🎛 LOW-PASS</label>
            <input type="range" id="filterSlider" min="400" max="8000" step="50" value="2800">
            <div class="value-display" id="filterVal">2800 Hz</div>
        </div>
    </div>

    <div id="statusMsg" class="status">
        🎧 1. اختر ملفاً صوتياً<br>2. اضغط "تشغيل" لبدء التجربة الفونكية
    </div>
    <footer>
        🖤 دعم كامل لنظام iOS (iPhone/iPad) | اضغط تشغيل بعد رفع الملف | المؤثرات تعمل لحظياً
    </footer>
</div>

<script>
    (function(){
        // --- عناصر الواجهة ---
        const canvas = document.getElementById('audioVisualizer');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioUpload = document.getElementById('audioUpload');
        const speedSlider = document.getElementById('speedSlider');
        const reverbSlider = document.getElementById('reverbSlider');
        const filterSlider = document.getElementById('filterSlider');
        const speedVal = document.getElementById('speedVal');
        const reverbVal = document.getElementById('reverbVal');
        const filterVal = document.getElementById('filterVal');
        const statusDiv = document.getElementById('statusMsg');
        
        // --- المتغيرات الأساسية ---
        let audioContext = null;           // سيتم إنشاؤه فقط عند أول ضغطة تشغيل
        let mediaElement = null;           // عنصر Audio الذي سنستخدمه
        let mediaSourceNode = null;
        let analyserNode = null;
        let filterNode = null;
        let dryGain = null;
        let wetGain = null;
        let delayNode = null;
        let feedbackGain = null;
        let outputGain = null;
        
        let isPlaying = false;
        let currentFileBlobUrl = null;     // رابط الملف المرفوع مؤقتاً
        let animationId = null;
        let contextReady = false;
        
        // ضبط حجم الرسم
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            canvas.width = width;
            canvas.height = 180;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // --- بناء شبكة المؤثرات الصوتية (لا تُستدعى إلا عند أول تشغيل) ---
        async function buildAudioGraph() {
            if (audioContext && contextReady) {
                if (audioContext.state === 'suspended') await audioContext.resume();
                return true;
            }
            try {
                // نغلق أي سياق قديم
                if (audioContext && audioContext.state !== 'closed') await audioContext.close();
                // استخدام webkitAudioContext للتوافق مع iOS
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // عقدة التحليل
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                
                // مرشح low-pass (عظيم للأجواء البطيئة)
                filterNode = audioContext.createBiquadFilter();
                filterNode.type = "lowpass";
                filterNode.frequency.value = parseFloat(filterSlider.value);
                filterNode.Q = 6;
                
                // عقد الصدى (reverb بسيط مع تغذية)
                delayNode = audioContext.createDelay();
                delayNode.delayTime.value = 0.38;
                feedbackGain = audioContext.createGain();
                feedbackGain.gain.value = 0.52;
                delayNode.connect(feedbackGain);
                feedbackGain.connect(delayNode);
                
                // خلط الإشارة الجافة والمبللة
                dryGain = audioContext.createGain();
                wetGain = audioContext.createGain();
                outputGain = audioContext.createGain();
                
                // توصيل المسار: filterNode -> dryGain / delayNode -> wetGain -> outputGain
                filterNode.connect(dryGain);
                filterNode.connect(delayNode);
                delayNode.connect(wetGain);
                dryGain.connect(outputGain);
                wetGain.connect(outputGain);
                outputGain.connect(analyserNode);
                analyserNode.connect(audioContext.destination);
                
                // ضبط القيم الأولية
                updateReverbMix();
                updateFilter();
                
                contextReady = true;
                return true;
            } catch(e) {
                console.error("فشل بناء graph الصوتي:", e);
                statusDiv.innerText = "❌ متصفحك لا يدعم Web Audio API المطلوب.";
                return false;
            }
        }
        
        // --- ربط mediaElement بالـ AudioGraph ---
        async function connectMediaToGraph() {
            if (!audioContext || !mediaElement || !contextReady) return false;
            try {
                if (mediaSourceNode) {
                    try { mediaSourceNode.disconnect(); } catch(e) {}
                }
                mediaSourceNode = audioContext.createMediaElementSource(mediaElement);
                mediaSourceNode.connect(filterNode);
                return true;
            } catch(e) {
                console.error("خطأ في ربط media element:", e);
                return false;
            }
        }
        
        // --- دالة التشغيل الرئيسية (يتم استدعاؤها بنقرة المستخدم) ---
        async function startPlayback() {
            // 1. التأكد من وجود ملف تم رفعه
            if (!mediaElement || !currentFileBlobUrl) {
                statusDiv.innerText = "⚠️ يرجى اختيار ملف صوتي أولاً باستخدام زر الرفع.";
                return;
            }
            
            // 2. بناء الـ AudioContext (سيحدث فقط في أول مرة أو بعد إعادة تعيين)
            const graphOk = await buildAudioGraph();
            if (!graphOk) return;
            
            // 3. التأكد من ربط الـ media element بالـ graph (في حال تم تغيير الملف مؤخراً)
            await connectMediaToGraph();
            
            // 4. استئناف السياق إن كان معلقاً (هام جداً في iOS)
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            // 5. تطبيق السرعة والمؤثرات
            updatePlaybackRate();
            updateFilter();
            updateReverbMix();
            
            // 6. بدء التشغيل
            try {
                await mediaElement.play();
                isPlaying = true;
                statusDiv.innerText = "🎵 الآن يعمل: Slowed + Reverb + Low-pass | صوت الفونك النقي";
                startVisualizerLoop();
            } catch(err) {
                console.warn(err);
                statusDiv.innerText = "⚠️ فشل التشغيل: " + (err.message || "تأكد من الضغط على زر التشغيل بعد رفع الملف");
                isPlaying = false;
            }
        }
        
        // --- رفع الملف (لا يبدأ التشغيل، فقط يجهز mediaElement) ---
        function prepareAudioFile(file) {
            if (!file || !file.type.startsWith('audio/')) {
                statusDiv.innerText = "⚠️ الرجاء اختيار ملف صوتي صالح (MP3, WAV, M4A).";
                return false;
            }
            // إلغاء الرابط القديم
            if (currentFileBlobUrl) URL.revokeObjectURL(currentFileBlobUrl);
            const url = URL.createObjectURL(file);
            currentFileBlobUrl = url;
            
            // إنشاء عنصر audio جديد
            if (mediaElement) {
                mediaElement.pause();
                mediaElement.src = '';
            }
            mediaElement = new Audio();
            mediaElement.src = url;
            mediaElement.crossOrigin = "anonymous";
            mediaElement.preload = "auto";
            mediaElement.loop = false;
            
            // ضبط السرعة من السلايدر (قبل التشغيل)
            updatePlaybackRate();
            
            // أحداث
            mediaElement.onended = () => {
                isPlaying = false;
                statusDiv.innerText = "⏹️ انتهى التشغيل. اضغط تشغيل مرة أخرى للإعادة.";
                stopVisualizerLoop();
            };
            mediaElement.onerror = () => {
                statusDiv.innerText = "❌ خطأ في تحميل الملف. تأكد من الصيغة.";
                stopVisualizerLoop();
            };
            
            statusDiv.innerText = `✅ تم تحميل: ${file.name}. اضغط زر "تشغيل" لبدء المؤثرات.`;
            // إذا كان السياق موجوداً مسبقاً وتم رفع ملف جديد، نحتاج إعادة ربطه عند التشغيل القادم
            // سيتم إعادة الربط تلقائياً في startPlayback عبر connectMediaToGraph()
            return true;
        }
        
        // --- تحديثات المؤثرات ---
        function updatePlaybackRate() {
            if (mediaElement) {
                const val = parseFloat(speedSlider.value);
                mediaElement.playbackRate = val;
                speedVal.innerText = val.toFixed(2) + 'x';
            } else {
                speedVal.innerText = speedSlider.value;
            }
        }
        
        function updateFilter() {
            if (filterNode) {
                const freq = parseFloat(filterSlider.value);
                filterNode.frequency.value = freq;
                filterVal.innerText = freq + ' Hz';
            } else {
                filterVal.innerText = filterSlider.value;
            }
        }
        
        function updateReverbMix() {
            if (dryGain && wetGain) {
                const wet = parseFloat(reverbSlider.value);
                wetGain.gain.value = wet;
                dryGain.gain.value = Math.max(0.2, 1 - wet * 0.7);
                reverbVal.innerText = wet.toFixed(2);
            } else {
                reverbVal.innerText = reverbSlider.value;
            }
        }
        
        // --- التحكم ---
        function pauseAudio() {
            if (mediaElement && !mediaElement.paused) {
                mediaElement.pause();
                isPlaying = false;
                statusDiv.innerText = "⏸ تم الإيقاف المؤقت";
                stopVisualizerLoop();
            } else if (!mediaElement) {
                statusDiv.innerText = "لا يوجد ملف مشغّل";
            }
        }
        
        function stopAudio() {
            if (mediaElement) {
                mediaElement.pause();
                mediaElement.currentTime = 0;
                isPlaying = false;
                statusDiv.innerText = "⏹ توقف كامل، اضغط تشغيل من البداية";
                stopVisualizerLoop();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                statusDiv.innerText = "لا توجد أغنية محملة";
            }
        }
        
        // --- Visualizer Loop ---
        function startVisualizerLoop() {
            if (animationId) cancelAnimationFrame(animationId);
            function draw() {
                if (!analyserNode || !isPlaying || !mediaElement || mediaElement.paused) {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                if (canvas.width === 0) resizeCanvas();
                const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
                analyserNode.getByteFrequencyData(dataArray);
                const w = canvas.width;
                const h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                const barCount = 48;
                const step = Math.max(1, Math.floor(dataArray.length / barCount));
                const barWidth = w / barCount;
                for (let i = 0; i < barCount; i++) {
                    let sum = 0;
                    for (let j = 0; j < step; j++) {
                        const idx = i * step + j;
                        if (idx < dataArray.length) sum += dataArray[idx];
                    }
                    const avg = sum / step;
                    const percent = avg / 255;
                    const barHeight = Math.max(3, percent * h * 0.85);
                    const x = i * barWidth;
                    const grad = ctx.createLinearGradient(x, h, x, h - barHeight);
                    grad.addColorStop(0, '#ff3a7a');
                    grad.addColorStop(1, '#ffb3d1');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, h - barHeight, barWidth - 1.2, barHeight);
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#ff4d8c';
                }
                ctx.shadowBlur = 0;
                animationId = requestAnimationFrame(draw);
            }
            draw();
        }
        
        function stopVisualizerLoop() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        // --- ربط الأحداث ---
        function bindEvents() {
            playBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                await startPlayback();
            });
            pauseBtn.addEventListener('click', pauseAudio);
            stopBtn.addEventListener('click', stopAudio);
            audioUpload.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    prepareAudioFile(e.target.files[0]);
                }
            });
            speedSlider.addEventListener('input', () => {
                updatePlaybackRate();
            });
            filterSlider.addEventListener('input', () => {
                updateFilter();
            });
            reverbSlider.addEventListener('input', () => {
                updateReverbMix();
            });
        }
        
        // --- إيماءة مساعدة لاستئناف السياق في iOS عند أي نقرة على الصفحة (تحسباً) ---
        async function resumeContextOnTouch() {
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
                statusDiv.innerText = "✓ تم تفعيل الصوت، يمكنك الضغط على تشغيل الآن.";
            }
        }
        document.body.addEventListener('touchstart', resumeContextOnTouch);
        document.body.addEventListener('click', resumeContextOnTouch);
        
        // بدء التشغيل
        bindEvents();
        resizeCanvas();
        statusDiv.innerHTML = "📱 iPhone/iOS جاهز: اختر ملفاً ثم اضغط (تشغيل) لسماع الصوت مع التأثيرات.";
    })();
</script>
</body>
</html>
