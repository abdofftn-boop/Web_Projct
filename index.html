<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo Ultra Visualizer Pro</title>
    <style>
        /* تصميم سينمائي مظلم يناسب الواجهات الاحترافية */
        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* خلفية الأنمي الديناميكية المخصصة */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1614680376593-902f74fa0d41?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
            filter: blur(10px) brightness(0.25);
            z-index: -1;
            transition: background 0.5s ease;
        }

        /* حاوية النبض المركزي المتفجر */
        .visualizer-container {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* هالة النيون الخارجية العنيفة */
        .neon-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.7) 0%, rgba(255, 0, 127, 0.4) 50%, transparent 70%);
            filter: blur(30px);
            z-index: 1;
            opacity: 0.2;
            transform: scale(1);
            transition: all 0.08s ease-out; /* استجابة فائقة السرعة لشكل قوي */
        }

        /* الشعار الدائري المركزي */
        .main-logo {
            position: relative;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
            border: 5px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            z-index: 2;
            transition: all 0.08s ease-out;
        }

        /* تأثيرات الحركة والنبض المتفجر والاهتزاز المستمر (Crazy Pulsing) */
        .playing .main-logo {
            animation: extremeLogo 0.35s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .playing .neon-glow {
            animation: extremeGlow 0.35s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes extremeLogo {
            0% { transform: scale(0.96); box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); border-color: #ff007f; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.12); box-shadow: 0 0 50px rgba(0, 240, 255, 1), 0 0 20px #00f0ff; border-color: #00f0ff; }
        }

        @keyframes extremeGlow {
            0% { transform: scale(0.9); opacity: 0.3; filter: blur(20px); }
            100% { transform: scale(1.6); opacity: 1; filter: blur(40px); background: radial-gradient(circle, rgba(255, 0, 127, 0.8) 0%, rgba(0, 240, 255, 0.5) 60%, transparent 70%); }
        }

        /* صندوق كلمات الـ Edit السحرية */
        .lyrics-box {
            margin-top: 25px;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            min-height: 45px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px #fff, 0 0 30px #ff007f;
            z-index: 5;
            transition: transform 0.1s ease;
        }

        .playing .lyrics-box {
            animation: textJitter 0.35s infinite alternate ease-in-out;
        }

        @keyframes textJitter {
            0% { transform: scale(1); text-shadow: 0 0 15px #fff; }
            100% { transform: scale(1.08); color: #00f0ff; text-shadow: 0 0 25px #00f0ff, 0 0 10px #7000ff; }
        }

        /* لوحة التحكم ورفع الملفات الذكية للأيفون */
        .upload-panel {
            margin-top: 35px;
            background: rgba(15, 15, 15, 0.95);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 430px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .file-label {
            background: #181818;
            border: 1px dashed #444;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
            transition: 0.2s;
        }

        .file-label:hover {
            border-color: #00f0ff;
            color: #fff;
        }

        input[type="file"] { display: none; }

        .btn-main {
            background: linear-gradient(45deg, #00f0ff, #7000ff, #ff007f);
            background-size: 200% auto;
            border: none;
            color: white;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
        }

        .btn-main:hover {
            background-position: right center;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="background-overlay" id="bgOverlay"></div>

    <div class="visualizer-container" id="visualizerContainer">
        <div class="neon-glow"></div>
        <div class="main-logo" id="logoDiv"></div>
    </div>

    <div class="lyrics-box" id="lyricsBox">🎧 صمّم الـ Edit الخاص بك 🎧</div>

    <div class="upload-panel">
        <label class="file-label">
            🎵 اضغط هنا لاختيار الأغنية من جهازك
            <input type="file" id="audioFile" accept="audio/*">
        </label>
        
        <label class="file-label">
            🖼️ اضغط هنا لاختيار صورة اللوجو الدائري
            <input type="file" id="logoFile" accept="image/*">
        </label>

        <label class="file-label">
            🌌 اضغط هنا لاختيار صورة الخلفية (اختياري)
            <input type="file" id="bgFile" accept="image/*">
        </label>

        <button class="btn-main" id="playBtn">تـشـغـيـل الـإيـقـاع ▶</button>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const visualizerContainer = document.getElementById('visualizerContainer');
        const lyricsBox = document.getElementById('lyricsBox');
        
        // عناصر الملفات والصور
        const audioFileInput = document.getElementById('audioFile');
        const logoFileInput = document.getElementById('logoFile');
        const bgFileInput = document.getElementById('bgFile');
        const logoDiv = document.getElementById('logoDiv');
        const bgOverlay = document.getElementById('bgOverlay');

        // كلمات افتراضية حماسية تتبدل تلقائياً مع الحركة العنيفة للأنيميشن
        const customLyrics = [
            "LET THE BASS DROP! 🔥",
            "TaTo FAMILY ON TRACK 🚀",
            "FEEL THE AUDIO EDIT VIBES ⚡",
            "POWERFUL SOUND SYSTEM 💥",
            "KEEP RIDING THE WAVE 🌊"
        ];

        // 1. عند اختيار ملف الصوت من الآيفون
        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file) {
                audio.src = URL.createObjectURL(file);
                lyricsBox.innerText = "تم تحميل الأغنية بنجاح! جاهز للانفجار ⚡";
                visualizerContainer.classList.remove('playing');
                playBtn.innerText = "تـشـغـيـل الـإيـقـاع ▶";
            }
        });

        // 2. عند اختيار صورة اللوجو الدائري
        logoFileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file) {
                logoDiv.style.backgroundImage = `url('${URL.createObjectURL(file)}')`;
            }
        });

        // 3. عند اختيار صورة الخلفية العامة
        bgFileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file) {
                bgOverlay.style.backgroundImage = `url('${URL.createObjectURL(file)}')`;
            }
        });

        // 4. تشغيل وإيقاف النبض المجنون والموسيقى
        let lyricsInterval;
        playBtn.addEventListener('click', () => {
            if (!audio.src) {
                alert("يا فايو، اختر ملف الأغنية أولاً من الزر المخصص لها!");
                return;
            }

            if (audio.paused) {
                audio.play();
                visualizerContainer.classList.add('playing');
                playBtn.innerText = "إيقاف مؤقت ⏸";
                
                // تدوير الكلمات الحماسية بشكل عشوائي مع الإيقاع القوي
                lyricsInterval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * customLyrics.length);
                    lyricsBox.innerText = customLyrics[randomIndex];
                }, 1500);
            } else {
                audio.pause();
                visualizerContainer.classList.remove('playing');
                playBtn.innerText = "تـشـغـيـل الـإيـقـاع ▶";
                clearInterval(lyricsInterval);
                lyricsBox.innerText = "تم الإيقاف مؤقتاً.";
            }
        });

        audio.addEventListener('ended', () => {
            visualizerContainer.classList.remove('playing');
            playBtn.innerText = "تـشـغـيـل الـإيـقـاع ▶";
            clearInterval(lyricsInterval);
            lyricsBox.innerText = "انتهى الـ Edit 🔄";
        });
    </script>
</body>
</html>
