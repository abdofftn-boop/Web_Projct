<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo Audio Edit Player</title>
    <style>
        /* إعدادات الخلفية العامة والتصميم المظلم */
        body {
            margin: 0;
            padding: 0;
            background: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية الأنمي الضبابية المليئة بالحيوية */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
            filter: blur(8px) brightness(0.4);
            z-index: -1;
        }

        /* حاوية المشغل الرئيسي */
        .player-container {
            background: rgba(20, 20, 20, 0.75);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        h2 {
            margin-top: 0;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            font-size: 24px;
        }

        /* الصورة المتحركة (الهيكل العظمي أو الـ Visualizer) */
        .visualizer-zone {
            margin: 25px 0;
            position: relative;
            display: inline-block;
        }

        .visualizer-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00f0ff;
            box-shadow: 0 0 20px #00f0ff;
            object-fit: cover;
            /* صورة هيكل عظمي راقص بصيغة GIF كمثال */
            background: url('https://media.giphy.com/media/3ohhwfAa9GsE1AndUY/giphy.gif') center/cover;
            transition: transform 0.5s ease;
        }

        /* تأثير الدوران عند التشغيل */
        .playing .visualizer-image {
            animation: rotateVisualizer 8s linear infinite;
        }

        @keyframes rotateVisualizer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* منطقة الكلمات (Lyrics) في المنتصف */
        .lyrics-container {
            height: 60px;
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .highlight {
            color: #00f0ff;
            text-shadow: 0 0 12px #00f0ff;
            transform: scale(1.1);
        }

        /* أزرار التحكم ومجرى الصوت */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-play {
            background: linear-gradient(45deg, #ff007f, #7000ff);
            border: none;
            color: white;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
        }

        /* لوحة التحكم الجانبية للتخصيص */
        .customizer-panel {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            text-align: right;
        }

        .customizer-panel input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 12px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .customizer-panel label {
            color: #00f0ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="player-container" id="playerContainer">
        <h2>Symphony - TaTo Edit 🎧</h2>
        
        <div class="visualizer-zone">
            <div class="visualizer-image"></div>
        </div>

        <div class="lyrics-container" id="lyricsBox">
            اضغط تشغيل للبدء...
        </div>

        <div class="controls">
            <button class="btn-play" id="playBtn">تـشـغـيـل ▶</button>
            <audio id="mainAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>

        <div class="customizer-panel">
            <label for="audioUrl">رابط الأغنية المباشر (MP3):</label>
            <input type="text" id="audioUrl" placeholder="أدخل رابط الأغنية هنا...">
            
            <label for="bgUrl">رابط صورة الخلفية:</label>
            <input type="text" id="bgUrl" placeholder="أدخل رابط صورة الخلفية...">
            
            <button class="btn-play" style="padding: 6px 15px; font-size: 14px;" id="updateBtn">تحديث الإعدادات ✨</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const playerContainer = document.getElementById('playerContainer');
        const lyricsBox = document.getElementById('lyricsBox');
        
        // إعدادات التخصيص
        const audioUrlInput = document.getElementById('audioUrl');
        const bgUrlInput = document.getElementById('bgUrl');
        const updateBtn = document.getElementById('updateBtn');
        const bgOverlay = document.querySelector('.background-overlay');

        // قائمة الكلمات والمزامنة بالثواني (يمكنك تعديلها وتخصيصها)
        const lyricsTimeline = [
            { time: 0, text: "🎵 أهلاً بك في مشغل TaTo عالي الجودة 🎵" },
            { time: 3, text: "I just wanna be part of your symphony..." },
            { time: 7, text: "Will you hold me tight and not let go? 💔" },
            { time: 12, text: "Symphony... Like a love song on the radio 📻" },
            { time: 18, text: "جاري الاستمتاع بالنغمة الحماسية... 🔥" }
        ];

        // تشغيل وإيقاف الموسيقى والتأثيرات البصرية
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "إيقاف مؤقت ⏸";
                playerContainer.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerText = "تـشـغـيـل ▶";
                playerContainer.classList.remove('playing');
            }
        });

        // تحديث الكلمات تلقائياً بناءً على وقت الأغنية الحقيقي
        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            
            // البحث عن السطر المناسب للوقت الحالي
            let currentText = lyricsTimeline.text;
            for (let i = 0; i < lyricsTimeline.length; i++) {
                if (currentTime >= lyricsTimeline[i].time) {
                    currentText = lyricsTimeline[i].text;
                }
            }
            
            if(lyricsBox.innerText !== currentText) {
                lyricsBox.innerText = currentText;
                lyricsBox.classList.add('highlight');
                setTimeout(() => lyricsBox.classList.remove('highlight'), 500);
            }
        });

        // زر تحديث الروابط المخصصة
        updateBtn.addEventListener('click', () => {
            if (audioUrlInput.value.trim() !== "") {
                audio.src = audioUrlInput.value.trim();
                playBtn.innerText = "تـشـغـيـل ▶";
                playerContainer.classList.remove('playing');
                lyricsBox.innerText = "تم تغيير الأغنية! اضغط تشغيل.";
            }
            if (bgUrlInput.value.trim() !== "") {
                bgOverlay.style.background = `url('${bgUrlInput.value.trim()}') center/cover no-repeat`;
            }
        });
    </script>
</body>
</html>
