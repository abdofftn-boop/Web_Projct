<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PhonkCIAN - Parano! (Slowed+Reverb) | ميديافونك تفاعلي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030205);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255, 0, 100, 0.02) 0px, rgba(255, 0, 100, 0.02) 2px, transparent 2px, transparent 8px),
                        repeating-linear-gradient(135deg, rgba(0, 255, 200, 0.02) 0px, rgba(0, 255, 200, 0.02) 1px, transparent 1px, transparent 6px);
            pointer-events: none;
            z-index: 0;
        }

        .phonk-player {
            max-width: 1100px;
            width: 100%;
            background: rgba(12, 10, 20, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 70, 140, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 80, 120, 0.2), 0 0 20px rgba(255, 0, 100, 0.3);
            padding: 2rem 1.8rem;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .song-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 100, 150, 0.5);
            padding-bottom: 1rem;
        }
        .song-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ff4d8c, #b9266f, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 70, 140, 0.5);
        }
        .song-artist {
            font-size: 1rem;
            color: #cfb3ff;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 300;
        }
        .tag {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ff98c0;
            margin-top: 8px;
            border: 0.5px solid #ff3a7a;
        }

        .viz-container {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 2rem;
            padding: 1rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 100, 150, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.2);
        }
        canvas#audioVisualizer {
            width: 100%;
            height: 180px;
            display: block;
            border-radius: 1.2rem;
            background: #010008;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 8px #ff3a7a;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.8rem 0;
        }
        .btn {
            background: rgba(20, 15, 35, 0.8);
            border: 1px solid #ff4d8c;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(95deg, #c2185b, #8e2c6d);
            border-color: #ff80ab;
            box-shadow: 0 0 10px #ff3a7a;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #d81b60, #9c2e77);
            box-shadow: 0 0 15px #ff4d8c;
        }
        .btn:hover {
            background: rgba(80, 40, 80, 0.9);
            border-color: #ff99bb;
        }
        .file-label {
            background: #2a1e3c;
            border: 1px solid #b96f9f;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #3c2a52;
        }
        input[type="file"] {
            display: none;
        }
        .status {
            text-align: center;
            color: #e2c8ff;
            font-size: 0.85rem;
            margin: 12px 0 0;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 2rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .slider-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            margin: 1rem 0 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
        }
        .effect-control {
            flex: 1;
            min-width: 130px;
        }
        .effect-control label {
            font-size: 0.7rem;
            color: #ffafcf;
            display: block;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            background: #3a2a4a;
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff5e9e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px #ff99cc;
        }
        .value-display {
            color: #ffb7d0;
            font-size: 0.7rem;
            text-align: right;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7a62a5;
            margin-top: 1.5rem;
            border-top: 0.5px solid rgba(255,100,150,0.3);
            padding-top: 1rem;
        }
        @media (max-width: 650px) {
            .phonk-player { padding: 1.2rem; }
            .song-title { font-size: 1.6rem; }
            .btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>
<div class="phonk-player">
    <div class="song-header">
        <div class="song-title">PARANO! (slowed + reverb)</div>
        <div class="song-artist">PHONKCIAN · ETERNAL XLKZ VIBE</div>
        <div class="tag">⚡ SLOWED | 🎧 REVERB | 🔮 VISUALIZER</div>
    </div>

    <div class="viz-container">
        <canvas id="audioVisualizer" width="800" height="180" style="width:100%; height:180px"></canvas>
    </div>

    <div class="controls">
        <button id="playBtn" class="btn btn-primary">▶ تشغيل / استئناف</button>
        <button id="pauseBtn" class="btn">⏸ إيقاف مؤقت</button>
        <button id="stopBtn" class="btn">⏹ إيقاف كامل</button>
        <label class="file-label" for="audioUpload">📁 رفع ملف صوتي (MP3, WAV, M4A)</label>
        <input type="file" id="audioUpload" accept="audio/mpeg, audio/wav, audio/ogg, audio/mp3, audio/aac, audio/m4a, audio/x-m4a">
    </div>

    <div class="slider-panel">
        <div class="effect-control">
            <label>🐌 SLOW MOTION (سرعة التشغيل)</label>
            <input type="range" id="speedSlider" min="0.5" max="1.2" step="0.01" value="0.78">
            <div class="value-display" id="speedVal">0.78x</div>
        </div>
        <div class="effect-control">
            <label>🌀 REVERB / ECHO (صدى)</label>
            <input type="range" id="reverbSlider" min="0" max="0.85" step="0.01" value="0.55">
            <div class="value-display" id="reverbVal">0.55</div>
        </div>
        <div class="effect-control">
            <label>🎛 LOW-PASS (ظلام الصوت)</label>
            <input type="range" id="filterSlider" min="400" max="8000" step="50" value="2800">
            <div class="value-display" id="filterVal">2800 Hz</div>
        </div>
    </div>

    <div id="statusMsg" class="status">
        🎧 حمّل ملفاً صوتياً (MP3/WAV) لتجربة الأجواء البطيئة والمؤثرات والمرئيات
    </div>
    <footer>
        🖤 متوافق مع Safari & Chrome | إشارة صوتية حية + تأثيرات فورية | اسحب أي ملف واختبر الصوت
    </footer>
</div>

<script>
    (function(){
        // --- عناصر DOM ---
        const canvas = document.getElementById('audioVisualizer');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioUpload = document.getElementById('audioUpload');
        const speedSlider = document.getElementById('speedSlider');
        const reverbSlider = document.getElementById('reverbSlider');
        const filterSlider = document.getElementById('filterSlider');
        const speedVal = document.getElementById('speedVal');
        const reverbVal = document.getElementById('reverbVal');
        const filterVal = document.getElementById('filterVal');
        const statusDiv = document.getElementById('statusMsg');

        // --- متغيرات الصوت العامة ---
        let audioContext = null;          // سيبدأ بعد أول تفاعل (رفع ملف أو زر تشغيل)
        let mediaElement = null;          // عنصر Audio
        let mediaSourceNode = null;       // MediaElementSourceNode
        let analyserNode = null;          // لتحليل الترددات (visualizer)
        let filterNode = null;             // مرشح low-pass
        let dryGain = null;                // الإشارة الجافة (direct)
        let wetGain = null;                // إشارة الصدى
        let delayNode = null;              // عقدة التأخير للصدى
        let feedbackGain = null;           // لتغذية الصدى
        let outputGain = null;              // نقطة الالتقاء النهائية قبل الـ analyser
        
        let isPlaying = false;
        let currentAudioUrl = null;
        let animationId = null;
        let isContextInitialized = false;

        // ضبط حجم Canvas ديناميكياً
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            canvas.width = width;
            canvas.height = 180;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- إنشاء AudioContext وكامل شبكة العقد (تسمى مرة واحدة فقط عند أول تفاعل حقيقي للمستخدم) ---
        async function initAudioGraph() {
            if (isContextInitialized && audioContext && audioContext.state !== 'closed') {
                // إذا كان السياق معلقاً نستأنفه
                if (audioContext.state === 'suspended') await audioContext.resume();
                return true;
            }
            try {
                // في حال وجود سياق قديم نغلقه
                if (audioContext && audioContext.state !== 'closed') await audioContext.close();
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 1. عقدة التحليل
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                
                // 2. مرشح low-pass لإعطاء إحساس مظلم وبطيء
                filterNode = audioContext.createBiquadFilter();
                filterNode.type = "lowpass";
                filterNode.frequency.value = parseFloat(filterSlider.value);
                filterNode.Q = 5;
                
                // 3. عقد الصدى (reverb بسيط باستخدام تأخير مع تغذية)
                delayNode = audioContext.createDelay();
                delayNode.delayTime.value = 0.38;  // صدى عميق
                feedbackGain = audioContext.createGain();
                feedbackGain.gain.value = 0.5;      // مستوى التغذية الراجعة
                
                // توصيل حلقة الصدى: delayNode -> feedbackGain -> delayNode (feedback loop)
                delayNode.connect(feedbackGain);
                feedbackGain.connect(delayNode);
                
                // 4. Gains للخلط: الجاف (Dry) والمبلل (Wet)
                dryGain = audioContext.createGain();
                wetGain = audioContext.createGain();
                outputGain = audioContext.createGain();    // نقطة تجميع قبل المحلل
                
                // ضبط القيم الأولية
                dryGain.gain.value = 1 - parseFloat(reverbSlider.value) * 0.7;
                wetGain.gain.value = parseFloat(reverbSlider.value);
                
                // توصيل الإشارة: من المرشح => (التفرع إلى dryGain و delayNode)
                // ثم dryGain و wetGain (الخارج من delayNode) يذهبان إلى outputGain
                // ثم outputGain -> analyser -> destination
                filterNode.connect(dryGain);
                filterNode.connect(delayNode);
                delayNode.connect(wetGain);
                dryGain.connect(outputGain);
                wetGain.connect(outputGain);
                outputGain.connect(analyserNode);
                analyserNode.connect(audioContext.destination);
                
                isContextInitialized = true;
                return true;
            } catch(e) {
                console.error("خطأ في بناء graph الصوتي:", e);
                statusDiv.innerText = "❌ متصفحك لا يدعم Web Audio API كاملاً.";
                return false;
            }
        }
        
        // --- ربط عنصر الصوت الحالي بالـ AudioGraph ---
        async function connectMediaToGraph() {
            if (!audioContext || !mediaElement) return false;
            try {
                // إذا كان هناك مصدر سابق، فصله
                if (mediaSourceNode) {
                    try { mediaSourceNode.disconnect(); } catch(e) {}
                }
                mediaSourceNode = audioContext.createMediaElementSource(mediaElement);
                // المسار: mediaSourceNode -> filterNode (ثم باقي العقد موصولة مسبقاً)
                mediaSourceNode.connect(filterNode);
                return true;
            } catch(e) {
                console.error("فشل توصيل media element:", e);
                return false;
            }
        }
        
        // --- تحديث سرعة التشغيل (slowed) ---
        function updatePlaybackRate() {
            if (mediaElement) {
                const val = parseFloat(speedSlider.value);
                mediaElement.playbackRate = val;
                speedVal.innerText = val.toFixed(2) + 'x';
            }
        }
        
        // --- تحديث مرشح low-pass ---
        function updateFilter() {
            if (filterNode) {
                const freq = parseFloat(filterSlider.value);
                filterNode.frequency.value = freq;
                filterVal.innerText = freq + ' Hz';
            }
        }
        
        // --- تحديث مستوى الصدى (Reverb mix) ---
        function updateReverbMix() {
            if (dryGain && wetGain) {
                const wet = parseFloat(reverbSlider.value);
                wetGain.gain.value = wet;
                // خفض الجاف قليلاً لإبراز الصدى
                dryGain.gain.value = Math.max(0.25, 1 - wet * 0.7);
                reverbVal.innerText = wet.toFixed(2);
            }
        }
        
        // --- تحميل ملف صوتي وربطه ---
        async function loadAudioFile(file) {
            if (!file) return false;
            if (!file.type.startsWith('audio/')) {
                statusDiv.innerText = "⚠️ الرجاء اختيار ملف صوتي صالح (MP3, WAV, M4A).";
                return false;
            }
            
            // 1. تهيئة graph الصوتي إذا لم يحدث (بسبب تفاعل المستخدم برفع الملف)
            const graphReady = await initAudioGraph();
            if (!graphReady) return false;
            
            // 2. إلغاء الرابط القديم
            if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
            const fileUrl = URL.createObjectURL(file);
            currentAudioUrl = fileUrl;
            
            // 3. إنشاء عنصر audio جديد
            if (mediaElement) {
                mediaElement.pause();
                mediaElement.src = '';
            }
            mediaElement = new Audio();
            mediaElement.src = fileUrl;
            mediaElement.crossOrigin = "anonymous";
            mediaElement.preload = "auto";
            mediaElement.loop = false;
            updatePlaybackRate();   // تطبيق السرعة من السلايدر
            
            // أحداث
            mediaElement.onended = () => {
                isPlaying = false;
                statusDiv.innerText = "⏹️ انتهى التشغيل. يمكنك رفع ملف آخر أو إعادة التشغيل.";
                stopVisualizerLoop();
            };
            mediaElement.onerror = () => {
                statusDiv.innerText = "❌ خطأ في تحميل الملف. تأكد من الصيغة (MP3/WAV/M4A).";
                stopVisualizerLoop();
            };
            
            // 4. توصيل media element بمخطط الصوت
            const connected = await connectMediaToGraph();
            if (!connected) {
                statusDiv.innerText = "⚠️ مشكلة في توصيل مسار الصوت. حاول مرة أخرى.";
                return false;
            }
            
            // 5. تحديث المؤثرات بشكل فعال
            updateFilter();
            updateReverbMix();
            
            // 6. استئناف السياق إن كان معلقاً
            if (audioContext.state === 'suspended') await audioContext.resume();
            
            // 7. تشغيل تلقائي (لكن بعض المتصفحات تمنع auto-play، لذلك قد يحتاج المستخدم للضغط على زر التشغيل)
            try {
                await mediaElement.play();
                isPlaying = true;
                statusDiv.innerText = `🎵 الآن تشغيل: ${file.name} | Slowed + Reverb نشطة 🎵`;
                startVisualizerLoop();
            } catch (autoplayErr) {
                statusDiv.innerText = `✅ جاهز للتشغيل (اضغط ▶️): ${file.name}`;
                isPlaying = false;
                // لا نبدأ visualizer حتى التشغيل
            }
            return true;
        }
        
        // --- تشغيل الصوت الحالي ---
        async function playCurrentAudio() {
            if (!mediaElement) {
                statusDiv.innerText = "⚠️ يرجى رفع ملف صوتي أولاً باستخدام الزر.";
                return;
            }
            if (!isContextInitialized) {
                const ok = await initAudioGraph();
                if (!ok) return;
            }
            // تأكد من توصيل العقد (في حال تم رفع الملف من قبل وتم قطع الاتصال لسبب ما)
            if (mediaSourceNode === null || mediaSourceNode.mediaElement !== mediaElement) {
                await connectMediaToGraph();
            }
            
            if (audioContext.state === 'suspended') await audioContext.resume();
            
            try {
                await mediaElement.play();
                isPlaying = true;
                statusDiv.innerText = "🔊 جاري التشغيل بتأثيرات Slowed + Reverb";
                startVisualizerLoop();
            } catch(e) {
                statusDiv.innerText = "⚠️ تعذر التشغيل: " + (e.message || "يجب التفاعل مع الصفحة أولاً");
                console.warn(e);
            }
        }
        
        function pauseAudio() {
            if (mediaElement && !mediaElement.paused) {
                mediaElement.pause();
                isPlaying = false;
                statusDiv.innerText = "⏸ توقف مؤقت";
                stopVisualizerLoop();
            } else if (mediaElement && mediaElement.paused) {
                // لا شيء
            } else {
                statusDiv.innerText = "لا يوجد ملف مشغل";
            }
        }
        
        function stopAudio() {
            if (mediaElement) {
                mediaElement.pause();
                mediaElement.currentTime = 0;
                isPlaying = false;
                statusDiv.innerText = "⏹ توقف كامل";
                stopVisualizerLoop();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                statusDiv.innerText = "لا توجد أي أغنية";
            }
        }
        
        // --- رسم visualizer باستخدام محلل الترددات ---
        function startVisualizerLoop() {
            if (animationId) cancelAnimationFrame(animationId);
            
            function draw() {
                if (!analyserNode || !isPlaying || !mediaElement || mediaElement.paused) {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                if (canvas.width === 0) resizeCanvas();
                const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
                analyserNode.getByteFrequencyData(dataArray);
                const w = canvas.width;
                const h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                
                const barCount = 48;
                const step = Math.max(1, Math.floor(dataArray.length / barCount));
                const barWidth = w / barCount;
                
                for (let i = 0; i < barCount; i++) {
                    let sum = 0;
                    for (let j = 0; j < step; j++) {
                        const idx = i * step + j;
                        if (idx < dataArray.length) sum += dataArray[idx];
                    }
                    let avg = sum / step;
                    const percent = avg / 255;
                    const barHeight = Math.max(3, percent * h * 0.85);
                    const x = i * barWidth;
                    const grad = ctx.createLinearGradient(x, h, x, h - barHeight);
                    grad.addColorStop(0, '#ff3a7a');
                    grad.addColorStop(1, '#ffafcf');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, h - barHeight, barWidth - 1.5, barHeight);
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#ff4d8c';
                }
                ctx.shadowBlur = 0;
                animationId = requestAnimationFrame(draw);
            }
            draw();
        }
        
        function stopVisualizerLoop() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        // --- استماع للأحداث ---
        function bindUI() {
            playBtn.addEventListener('click', async () => {
                if (!mediaElement && audioUpload.files.length === 0) {
                    statusDiv.innerText = "🎼 حمّل ملفاً صوتياً أولاً باستخدام زر الرفع";
                    return;
                }
                await playCurrentAudio();
            });
            pauseBtn.addEventListener('click', pauseAudio);
            stopBtn.addEventListener('click', stopAudio);
            audioUpload.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    await loadAudioFile(file);
                }
            });
            speedSlider.addEventListener('input', () => updatePlaybackRate());
            filterSlider.addEventListener('input', () => updateFilter());
            reverbSlider.addEventListener('input', () => updateReverbMix());
        }
        
        // --- تأكيد أن أي تفاعل على الصفحة يسمح باستئناف السياق (لمساعدة Safari) ---
        async function resumeAudioContextOnUserGesture() {
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
                statusDiv.innerText = "✓ تم تفعيل الصوت، يمكنك رفع ملف أو تشغيل";
            }
        }
        window.addEventListener('click', resumeAudioContextOnUserGesture);
        window.addEventListener('touchstart', resumeAudioContextOnUserGesture);
        
        // بدء التطبيق
        bindUI();
        statusDiv.innerText = "🎤 ارفع ملف MP3/WAV لبدء التجربة الفونكية | متوافق مع Safari و Chrome";
        resizeCanvas();
        
        // تنظيف عند الخروج
        window.addEventListener('beforeunload', () => {
            if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
            if (mediaElement) mediaElement.src = '';
            if (audioContext) audioContext.close();
        });
    })();
</script>
</body>
</html>
