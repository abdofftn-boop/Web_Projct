<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo Audio Edit - Full Layout</title>
    <style>
        /* إعدادات الشاشة العامة لتشبه شاشة الهاتف أو مشغل الفيديو */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية بنفس أبعاد الفيديو */
        .video-layout {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            border: 2px solid #222;
            background: #000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* النصف العلوي: خلفية الأنمي والكلمات */
        .top-section {
            flex: 1;
            position: relative;
            background: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid #111;
        }

        /* طبقة مظلمة خفيفة فوق الأنمي لتوضيح الكلمات */
        .top-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* الكلمات المكتوبة في منتصف الجزء العلوي */
        .lyrics-box {
            position: relative;
            z-index: 2;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px #ff007f;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* تأثير النبض عند تغير الكلمات */
        .pulse {
            transform: scale(1.15);
            color: #00f0ff;
            text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
        }

        /* النصف السفلي: الهيكل العظمي الراقص */
        .bottom-section {
            flex: 1;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* الهيكل العظمي (Giphy المشابه للفيديو) */
        .skeleton-gif {
            width: 85%;
            height: 85%;
            background: url('https://media.giphy.com/media/3ohhwfAa9GsE1AndUY/giphy.gif') center/contain no-repeat;
            opacity: 0.4; /* يكون شبه شفاف عندما يتوقف */
            transition: opacity 0.3s ease;
        }

        /* عندما تعمل الموسيقى، تزيد إضاءة الهيكل العظمي */
        .playing .skeleton-gif {
            opacity: 1;
            filter: drop-shadow(0 0 15px #7000ff);
        }

        /* لوحة التحكم السفلية لتشغيل وتغيير الأغنية */
        .controls-panel {
            background: #111;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            border-top: 1px solid #222;
        }

        .row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn {
            background: linear-gradient(45deg, #ff007f, #7000ff);
            border: none;
            color: white;
            padding: 10px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        input {
            flex: 2;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        /* إخفاء مشغل اليوتيوب الأصلي تماماً */
        #ytPlayer { display: none; }
    </style>
</head>
<body>

    <div id="ytPlayer"></div>

    <div class="video-layout" id="videoLayout">
        
        <div class="top-section">
            <div class="lyrics-box" id="lyricsBox">Symphony Audio Edit</div>
        </div>

        <div class="bottom-section">
            <div class="skeleton-gif"></div>
        </div>

        <div class="controls-panel">
            <div class="row">
                <button class="btn" id="playBtn">تشغيل ▶</button>
            </div>
            <div class="row">
                <input type="text" id="ytIdInput" placeholder="ضع كود يوتيوب (مثال: kqlXf7_O6Eg)">
                <button class="btn" id="changeBtn" style="background: #333;">تغيير 🔄</button>
            </div>
        </div>

    </div>

    <script>
        // تحميل مكاتب اليوتيوب الرسمية
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        const playBtn = document.getElementById('playBtn');
        const changeBtn = document.getElementById('changeBtn');
        const ytIdInput = document.getElementById('ytIdInput');
        const videoLayout = document.getElementById('videoLayout');
        const lyricsBox = document.getElementById('lyricsBox');

        // جدول الكلمات متزامن بالثواني مع النسخة المسرعة من الأغنية (Symphony Sped Up)
        const lyricsTimeline = [
            { time: 0, text: "Symphony - Clean Bandit" },
            { time: 1, text: "and now I'm feeling incomplete" },
            { time: 3.5, text: "so if you want the truth" },
            { time: 6.5, text: "I just wanna be part of your symphony..." },
            { time: 10, text: "Will you hold me tight and not let go?" },
            { time: 14, text: "Symphony..." },
            { time: 16, text: "Like a love song on the radio..." },
            { time: 20, text: "will you hold me tight and not let go?" }
        ];

        // تهيئة المشغل فور جاهزية الخدمة
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '0', width: '0',
                videoId: 'kqlXf7_O6Eg', // الكود الافتراضي لـ Symphony Sped up
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        let lyricsInterval;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                playBtn.innerText = "إيقاف مؤقت ⏸";
                videoLayout.classList.add('playing');
                lyricsInterval = setInterval(trackLyrics, 100); // فحص الوقت بدقة كل 100 مللي ثانية
            } else {
                playBtn.innerText = "تشغيل ▶";
                videoLayout.classList.remove('playing');
                clearInterval(lyricsInterval);
            }
        }

        // التحكم بالزر
        playBtn.addEventListener('click', () => {
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        // تغيير الأغنية عن طريق الآيدي
        changeBtn.addEventListener('click', () => {
            const id = ytIdInput.value.trim();
            if(id) {
                player.cueVideoById(id);
                lyricsBox.innerText = "تم التحديث، اضغط تشغيل!";
            }
        });

        // دالة مزامنة وتحديث الكلمات
        function trackLyrics() {
            const currentTime = player.getCurrentTime();
            let matchedText = lyricsTimeline.text;

            for (let i = 0; i < lyricsTimeline.length; i++) {
                if (currentTime >= lyricsTimeline[i].time) {
                    matchedText = lyricsTimeline[i].text;
                }
            }

            if (lyricsBox.innerText !== matchedText) {
                lyricsBox.innerText = matchedText;
                lyricsBox.classList.add('pulse');
                setTimeout(() => lyricsBox.classList.remove('pulse'), 300);
            }
        }
    </script>
</body>
</html>
