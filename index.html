<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaTo All-Files Player</title>
    <style>
        :root {
            --bg-color: #000;
            --island-bg: #111;
            --accent-color: #00f2fe;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .upload-wrapper {
            margin-bottom: 30px;
        }

        .upload-btn {
            background: #222;
            color: #eee;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-block;
        }

        .upload-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }

        .player-island {
            width: 90%;
            max-width: 350px;
            height: 65px;
            background: var(--island-bg);
            border: 1px solid #222;
            border-radius: 40px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .album-art {
            width: 42px;
            height: 42px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        .song-info {
            flex-grow: 1;
            margin: 0 15px;
            text-align: right;
            overflow: hidden;
        }

        #songName {
            color: #fff;
            font-size: 13px;
            white-space: nowrap;
            display: block;
            opacity: 0.8;
            text-overflow: ellipsis;
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 25px;
            width: 60px;
            justify-content: flex-end;
        }

        .bar {
            width: 3px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 10px;
            transition: height 0.05s linear;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="upload-wrapper">
            <!-- تم تغيير accept لتقبل كل أنواع الملفات -->
            <input type="file" id="audioUpload" accept="*" hidden>
            <label for="audioUpload" class="upload-btn">اختر أي ملف 📁</label>
        </div>

        <div class="player-island" id="player">
            <div class="album-art" id="art">TaTo</div>
            
            <div class="song-info">
                <span id="songName">بانتظار الملف...</span>
            </div>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
        
        <audio id="audioSource"></audio>
    </div>

    <script>
        const audioUpload = document.getElementById('audioUpload');
        const audio = document.getElementById('audioSource');
        const bars = document.querySelectorAll('.bar');
        const songName = document.getElementById('songName');
        
        let audioCtx;
        let analyser;

        audioUpload.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            songName.textContent = file.name;

            const url = URL.createObjectURL(file);
            audio.src = url;

            // التأكد من تهيئة الصوت لمتصفح Safari
            if (!audioCtx) {
                initAudio();
            }
            
            // محاولة التشغيل
            audio.play().catch(err => {
                console.warn("تنبيه: الملف المختار قد لا يكون ملفاً صوتياً مدعوماً.");
                songName.textContent = "عذراً، الملف غير مدعوم!";
            });
        };

        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);

                analyser.fftSize = 64; 
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);

                    bars.forEach((bar, i) => {
                        const value = dataArray[i * 2]; 
                        const percent = value / 255;
                        const height = percent * 30;
                        bar.style.height = Math.max(4, height) + 'px';
                        bar.style.opacity = 0.5 + (percent * 0.5);
                    });
                }

                draw();
            } catch (e) {
                console.error("خطأ في تهيئة الصوت:", e);
            }
        }

        // تحسين لمتصفحات الجوال (Safari iOS)
        document.addEventListener('click', function() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: false });
    </script>
</body>
</html>
